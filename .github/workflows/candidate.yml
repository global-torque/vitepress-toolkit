name: Candidate artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build once and attest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-24.04
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out protected tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.18.0
          cache: pnpm
      - name: Verify tag and install
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(git rev-parse origin/main)" = "${GITHUB_SHA}"
          test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
          pnpm --config.ignore-pnpmfile=true install --frozen-lockfile --ignore-scripts
      - name: Run package gates
        run: pnpm --config.enable-pre-post-scripts=false run ci
      - name: Pack the validated candidate once
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir release
          pnpm --config.ignore-scripts=true --config.ignore-pnpmfile=true pack --pack-destination release
          node scripts/create-release-manifest.mjs release
      - name: Select SHA-512 subject checksum
        id: subject
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          checksums=(release/*.tgz.sha512)
          test "${#checksums[@]}" -eq 1
          printf 'checksums=%s\n' "${checksums[0]}" >> "${GITHUB_OUTPUT}"
      - name: Attest candidate
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ${{ steps.subject.outputs.checksums }}
      - name: Download offline attestation bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          artifact=$(find release -maxdepth 1 -name '*.tgz' -print -quit)
          for attempt in 1 2 3 4 5; do
            if (cd release && gh attestation download "$(basename "${artifact}")" --repo "${GITHUB_REPOSITORY}" --digest-alg sha512); then
              exit 0
            fi
            printf 'attestation bundle not available (attempt %s/5)\n' "${attempt}" >&2
            sleep 5
          done
          exit 1
      - name: Verify offline attestation identity and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(release/*.tgz)
          bundles=(release/sha512:*.jsonl release/sha512-*.jsonl)
          test "${#artifacts[@]}" -eq 1
          test "${#bundles[@]}" -eq 1
          gh attestation verify "${artifacts[0]}" \
            --bundle "${bundles[0]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --digest-alg sha512 \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/candidate.yml" \
            --signer-digest "${GITHUB_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --deny-self-hosted-runners \
            --format json > /dev/null
      - name: Retain exact candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 90

  clean-room:
    name: ${{ matrix.manager }} / Node ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        manager:
          - npm
          - pnpm
        node:
          - 22.23.1
          - 24.18.0
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release
      - name: Verify installed bytes and all public imports
        run: node scripts/verify-installed-artifact.mjs release "${{ matrix.manager }}"

  draft-prerelease:
    name: Create immutable draft prerelease
    needs:
      - build
      - clean-room
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download exact candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: candidate-${{ github.sha }}
          path: release
      - name: Create draft prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          test "v${version}" = "${GITHUB_REF_NAME}"
          gh release create "${GITHUB_REF_NAME}" release/* \
            --draft \
            --prerelease \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Immutable candidate from ${GITHUB_SHA}. Publish this draft only after the named real-consumer gate and public release issue are complete."
